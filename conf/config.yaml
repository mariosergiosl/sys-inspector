# ==============================================================================
# FILE: conf/config.yaml
# DESCRIPTION: Main configuration for Sys-Inspector.
#              This file controls Execution Modes, Network Settings, Storage,
#              and Collection Intervals.
#
# USAGE:
#   - For SNAPSHOT mode: Set 'mode: snapshot'
#   - For LIVE mode:     Set 'mode: live' and configure 'network.bind_port'
#   - For DAEMON mode:   Set 'mode: daemon' (Universal Collector v0.80)
#   - For SERVER mode:   Set 'mode: server' and configure 'network.bind_port'
#   - For LOCAL-LIVE:    Set 'mode: local-live' (Daemon + WebUI)
#
# AUTHOR: Mario Luz (Sys-Inspector Project)
# VERSION: 0.80.00 (Updated from 0.70.01)
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. GENERAL SETTINGS
# ------------------------------------------------------------------------------
general:
  # Execution Mode. Options: [snapshot, live, daemon, server, local-live]
  # Default: snapshot (Runs once, saves DB, generates HTML, exits)
  # CHANGED v0.80: Set to 'daemon' for continuous local collection testing
  mode: "local-live"

  # Logging Verbosity. Options: [DEBUG, INFO, WARN, ERROR]
  log_level: "INFO"

# ------------------------------------------------------------------------------
# 2. NETWORK SETTINGS (For Live, Daemon, and Server modes)
# ------------------------------------------------------------------------------
network:
  # IP Address to bind the Web Server/API.
  bind_address: "0.0.0.0"

  # Port for the Web Interface (Live/Server mode)
  bind_port: 8080

  # [LEGACY v0.60] Used by old Daemon to push data directly (Deprecated in v0.80)
  # target_url: "http://127.0.0.1:8080"

# ------------------------------------------------------------------------------
# 3. COLLECTION SETTINGS
# ------------------------------------------------------------------------------
collection:
  # [LEGACY v0.60] Global interval fallback
  interval: 30

# ------------------------------------------------------------------------------
# 4. STORAGE SETTINGS (Local Persistence)
# ------------------------------------------------------------------------------
storage:
  type: "sqlite"

  # Path to the encrypted database
  # sqlite_path: "data/sys_inspector.db"
  sqlite_path: "/var/lib/sys-inspector/sys_inspector.db"

  # [v0.70] Retention Policy: Max number of snapshots to keep per Agent.
  # When limit is reached, oldest snapshots are deleted (Circular Buffer).
  max_snapshots: 100

  # [LEGACY v0.61] Byte-based limit (Kept for compatibility with old controllers)
  # Not actively used by DatabaseManager v0.70+ (relies on max_snapshots)
  # db_size_limit_bytes: 20971520

# ------------------------------------------------------------------------------
# 5. FEATURE FLAGS (Enable/Disable specific probes)
# ------------------------------------------------------------------------------
features:
  # Detect Docker/Podman/K8s containers via cgroups
  container_awareness: true

  # Detect Crypto-mining signatures and GPU usage (Needs NVML libs present)
  gpu_monitoring: true

  # Detect Security Inspectors (Fanotify/EDR presence)
  security_inspection: true

# ------------------------------------------------------------------------------
# 6. SECURITY (Zero-Knowledge & Hybrid Encryption)
# ------------------------------------------------------------------------------
security:
  # [v0.70 NEW] Path to the Analyst's Public Key.
  # REQUIRED for encrypting data before saving to DB (Agent/Snapshot).
  # public_key_path: "conf/public_key.pem"
  public_key_path: "/etc/sys-inspector/public_key.pem"

  # [v0.70 NEW] Path to the Analyst's Private Key.
  # REQUIRED ONLY for generating HTML reports or decrypting data.
  # WARNING: DO NOT deploy this file to Agents!
  # private_key_path: "conf/private_key.pem"
  private_key_path: "/etc/sys-inspector/private_key.pem"

  # [v0.70 NEW] Backend for symmetric encryption (fernet/aes-gcm)
  crypto_backend: "fernet"

# ------------------------------------------------------------------------------
# 7. MODE SPECIFIC SETTINGS
# ------------------------------------------------------------------------------

# Settings for 'snapshot' mode
snapshot:
  duration: 30 # Seconds to capture before exiting
  # output_dir: "report"
  output_dir: "/var/log/sys-inspector/reports"
  format: "html" # html, json

# Settings for 'daemon' mode (Agent)
daemon:
  # [v0.80 NEW] Duty Cycle Configuration for Local Collector
  # The daemon loops: Capture (active) -> Sleep (idle) -> Repeat
  capture_duration: 15 # Time collecting (Engine ON) - Active state
  interval: 15 # Time sleeping (Engine OFF) - Idle state

  # [FUTURE] Remote Server Config (Store-and-Forward)
  server_ip: "10.0.0.1"
  server_port: 443
  auth_token: "CHANGE_ME"

  # [LEGACY v0.60] Direct Sender Options (Not used in v0.80 Local logic yet)
  # batch_size: 10
  # retry_limit: 3

# Settings for 'server' mode (Central Manager)
server:
  # TLS Configuration (Required for Server Mode)
  # ssl_cert: "conf/server_cert.pem"
  ssl_cert: "/etc/sys-inspector/server_cert.pem"
  # ssl_key: "conf/server_key.pem"
  ssl_key: "/etc/sys-inspector/server_key.pem"

  # Access Control
  allowed_agents: [] # List of UUIDs. Empty = Allow All.
